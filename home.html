    <style>
      /* Styling Only Related To THIS Page */
      html {
        height: 100%;
      }

      body {
        background: purple;
      }

      .parent-flex {
        display: flex;
        flex-direction: column;
        width: 50%;
        height: 100vh;
        background: linear-gradient(to bottom, rgb(225,221,217) 0%, rgb(178,186,223) 100vh);
        /* background-image: url(); */
        align-items: center;
        justify-content: center;
        /* padding-top: 20px; */
        /* margin-bottom: -30%; */
        /* margin-top: 50px; */

      }

      .parent-flex img {
        width: 300px;
        margin-top: 70px;
      }
      .child-flex {
        padding: 10px;
      }

      .child-flex a {
        text-decoration: none;
        color: rgb(22,34,52);
      }

      /* ===================================================================================== */
      * {box-sizing: border-box;}
      body {font-family: Verdana, sans-serif;}
      .mySlides {display: none;}
      img {vertical-align: middle;}

      /* Slideshow container */
      .slideshow-container {
        max-width: 1000px;
        position: relative;
        margin: auto;
      }

      /* Caption text */
      .text {
        color: #f2f2f2;
        font-size: 15px;
        padding: 8px 12px;
        position: absolute;
        bottom: 8px;
        width: 100%;
        text-align: center;
      }

      /* Number text (1/3 etc) */
      .numbertext {
        font-size: 0px;
        padding: 8px 12px;
        position: absolute;
        top: 0;
      }

      /* The dots/bullets/indicators */
      .dot {
        height: 15px;
        width: 15px;
        margin: 0 2px;
        background-color: transparent;
        border-radius: 50%;
        display: inline-block;
        transition: background-color 0.6s ease;
      }

      .active {
        background-color: transparent;
      }

      /* Fading animation */
      .fade {
        animation-name: fade;
        animation-duration: 1.5s;
      }

      @keyframes fade {
        from {opacity: .4} 
        to {opacity: 1}
      }

      /* On smaller screens, decrease text size */
      @media only screen and (max-width: 300px) {
        .text {font-size: 11px}
      }

    </style>
  </head>
